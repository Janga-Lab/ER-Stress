<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img" aria-labelledby="title desc">
  <title id="title">ER-Stress Gene Severity Framework Pipeline Overview</title>
  <desc id="desc">A simple end-to-end diagram showing data sources, scripts, scoring logic, outputs, and core evaluation questions for the ER-stress severity framework project.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ed"/>
      <stop offset="100%" stop-color="#eef6fb"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>

    <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9f9f6"/>
      <stop offset="100%" stop-color="#d8f1ec"/>
    </linearGradient>

    <linearGradient id="processGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#dce9fb"/>
    </linearGradient>

    <linearGradient id="scoreGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff5e8"/>
      <stop offset="100%" stop-color="#ffe7c8"/>
    </linearGradient>

    <linearGradient id="outputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eefaf0"/>
      <stop offset="100%" stop-color="#daf0df"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#123447" flood-opacity="0.14"/>
    </filter>

    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#507084"/>
    </marker>

    <style>
      .title { font: 700 52px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #0f2b3a; }
      .subtitle { font: 400 24px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #345264; }
      .section { font: 700 25px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #143647; }
      .boxTitle { font: 700 24px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #123245; }
      .boxSub { font: 700 18px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #2d4d60; }
      .body { font: 500 16px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #314f62; }
      .small { font: 500 14px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #4a6677; }
      .mono { font: 600 14px 'Courier New', monospace; fill: #2b4a5b; }
      .badge { font: 700 13px 'Trebuchet MS', 'Segoe UI', Arial, sans-serif; fill: #0f3b4d; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1200" fill="url(#bgGrad)"/>
  <circle cx="1420" cy="130" r="260" fill="#d7eef8" opacity="0.35"/>
  <circle cx="230" cy="1060" r="290" fill="#dff4ef" opacity="0.42"/>

  <rect x="70" y="50" width="1660" height="140" rx="24" fill="url(#titleGrad)" opacity="0.08"/>
  <text x="100" y="120" class="title">ER-Stress Gene Severity Framework</text>
  <text x="100" y="163" class="subtitle">Simple project map: collect data -> curate -> score -> validate -> triage -> lab-ready outputs</text>

  <g transform="translate(90,230)">
    <rect x="0" y="0" width="360" height="370" rx="20" fill="url(#inputGrad)" stroke="#9acfc3" stroke-width="2" filter="url(#shadow)"/>
    <text x="22" y="38" class="section">1) Inputs</text>
    <text x="22" y="74" class="boxSub">Databases and evidence</text>

    <rect x="22" y="96" width="316" height="54" rx="10" fill="#ffffff" stroke="#c7dfe6"/>
    <text x="36" y="129" class="body">ClinVar (variants + clinical labels)</text>

    <rect x="22" y="160" width="316" height="54" rx="10" fill="#ffffff" stroke="#c7dfe6"/>
    <text x="36" y="193" class="body">Ensembl VEP (consequence terms)</text>

    <rect x="22" y="224" width="316" height="54" rx="10" fill="#ffffff" stroke="#c7dfe6"/>
    <text x="36" y="257" class="body">UniProt (domains/topology regions)</text>

    <rect x="22" y="288" width="316" height="54" rx="10" fill="#ffffff" stroke="#c7dfe6"/>
    <text x="36" y="321" class="body">PubMed + curated patient onset rows</text>

    <text x="22" y="356" class="small">Genes: WFS1, CISD2, EIF2AK3, IER3IP1, INS</text>
  </g>

  <g transform="translate(500,230)">
    <rect x="0" y="0" width="420" height="370" rx="20" fill="url(#processGrad)" stroke="#9ab7d9" stroke-width="2" filter="url(#shadow)"/>
    <text x="22" y="38" class="section">2) Build and curate</text>

    <rect x="22" y="70" width="376" height="74" rx="12" fill="#ffffff" stroke="#c8d8ea"/>
    <text x="36" y="99" class="boxTitle">importer.py</text>
    <text x="36" y="123" class="body">Fetch variants, annotations, and references</text>

    <rect x="22" y="156" width="376" height="74" rx="12" fill="#ffffff" stroke="#c8d8ea"/>
    <text x="36" y="185" class="boxTitle">prepare_for_parser.py</text>
    <text x="36" y="209" class="body">Build/load critical region map from UniProt</text>

    <rect x="22" y="242" width="376" height="74" rx="12" fill="#ffffff" stroke="#c8d8ea"/>
    <text x="36" y="271" class="boxTitle">parser.py</text>
    <text x="36" y="295" class="body">Clean, validate, and create curated tables</text>

    <text x="22" y="350" class="small">Data folders: data/raw_data -> data/curated_data</text>
  </g>

  <g transform="translate(970,230)">
    <rect x="0" y="0" width="380" height="370" rx="20" fill="url(#scoreGrad)" stroke="#e3b97d" stroke-width="2" filter="url(#shadow)"/>
    <text x="22" y="38" class="section">3) Score and evaluate</text>

    <rect x="22" y="70" width="336" height="104" rx="12" fill="#ffffff" stroke="#edd2ab"/>
    <text x="36" y="99" class="boxTitle">processor_region_filtered.py</text>
    <text x="36" y="124" class="body">Keep key regions and score per variant</text>
    <text x="36" y="148" class="mono">allele = class_weight + critical_bonus</text>

    <rect x="22" y="186" width="336" height="72" rx="12" fill="#ffffff" stroke="#edd2ab"/>
    <text x="36" y="214" class="mono">genotype = max(alleles) [dominant]</text>
    <text x="36" y="236" class="mono">genotype = sum(alleles) [recessive]</text>

    <rect x="22" y="270" width="336" height="70" rx="12" fill="#ffffff" stroke="#edd2ab"/>
    <text x="36" y="298" class="body">Unified bins:</text>
    <text x="36" y="322" class="mono">low | mild | moderate | high | very_high</text>

    <text x="22" y="358" class="small">Outputs include decision tiers and priority ranking</text>
  </g>

  <g transform="translate(1400,230)">
    <rect x="0" y="0" width="320" height="370" rx="20" fill="url(#outputGrad)" stroke="#9dc8a5" stroke-width="2" filter="url(#shadow)"/>
    <text x="22" y="38" class="section">4) Deliverables</text>

    <rect x="22" y="72" width="276" height="64" rx="10" fill="#ffffff" stroke="#cde3d2"/>
    <text x="36" y="100" class="body">Per-gene figures</text>
    <text x="36" y="122" class="small">criterion1, criterion2, criterion3</text>

    <rect x="22" y="148" width="276" height="64" rx="10" fill="#ffffff" stroke="#cde3d2"/>
    <text x="36" y="176" class="body">Core CSV tables</text>
    <text x="36" y="198" class="small">variant_processed, decision_tiers</text>

    <rect x="22" y="224" width="276" height="64" rx="10" fill="#ffffff" stroke="#cde3d2"/>
    <text x="36" y="252" class="body">Summary reports</text>
    <text x="36" y="274" class="small">success_criteria_summary, per_gene_run</text>

    <rect x="22" y="300" width="276" height="48" rx="10" fill="#ffffff" stroke="#cde3d2"/>
    <text x="36" y="330" class="small">Folder: data/curated_data/new</text>
  </g>

  <path d="M 452 416 L 494 416" stroke="#507084" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 922 416 L 964 416" stroke="#507084" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M 1352 416 L 1392 416" stroke="#507084" stroke-width="4" fill="none" marker-end="url(#arrow)"/>

  <g transform="translate(90,650)">
    <rect x="0" y="0" width="1630" height="470" rx="20" fill="#ffffff" stroke="#c9d7e0" stroke-width="2" filter="url(#shadow)"/>
    <text x="24" y="40" class="section">What the project asks (3 core questions)</text>

    <g transform="translate(24,64)">
      <rect x="0" y="0" width="516" height="250" rx="14" fill="#f5fbff" stroke="#c7ddef"/>
      <text x="20" y="34" class="boxTitle">Criterion 1: Variant pathogenic signal</text>
      <text x="20" y="66" class="body">Do higher-score variants show more pathogenic ClinVar labels?</text>
      <text x="20" y="104" class="mono">Input columns:</text>
      <text x="20" y="127" class="small">score_bin, allele_severity_points, pathogenic_binary</text>
      <text x="20" y="161" class="mono">Interpretation:</text>
      <text x="20" y="184" class="small">Higher group > lower group supports score usefulness.</text>
      <text x="20" y="216" class="small">Flat 100% vs 100% usually means label saturation.</text>
    </g>

    <g transform="translate(556,64)">
      <rect x="0" y="0" width="516" height="250" rx="14" fill="#f5fff9" stroke="#cae6d6"/>
      <text x="20" y="34" class="boxTitle">Criterion 2: Genotype vs clinical onset</text>
      <text x="20" y="66" class="body">Do stronger genotype scores align with earlier onset age?</text>
      <text x="20" y="104" class="mono">Input columns:</text>
      <text x="20" y="127" class="small">genotype_score, genotype_score_bin, dm_onset_age</text>
      <text x="20" y="161" class="mono">Interpretation:</text>
      <text x="20" y="184" class="small">Negative trend (higher score, lower onset age) supports model.</text>
      <text x="20" y="216" class="small">If too few rows/unique scores: report insufficient data.</text>
    </g>

    <g transform="translate(1088,64)">
      <rect x="0" y="0" width="516" height="250" rx="14" fill="#fff8f2" stroke="#edd2b7"/>
      <text x="20" y="34" class="boxTitle">Criterion 3: Actionable triage</text>
      <text x="20" y="66" class="body">Can we clearly split wet-lab priority vs deprioritized?</text>
      <text x="20" y="104" class="mono">Input columns:</text>
      <text x="20" y="127" class="small">confidence_level, major_discordance, needs_wetlab_validation</text>
      <text x="20" y="161" class="mono">Interpretation:</text>
      <text x="20" y="184" class="small">Tier_C indicates uncertain or conflicting evidence.</text>
      <text x="20" y="216" class="small">Tier_D indicates likely low-priority for immediate assays.</text>
    </g>

    <g transform="translate(24,336)">
      <rect x="0" y="0" width="1582" height="108" rx="14" fill="#f7fafc" stroke="#d6e0e7"/>
      <text x="20" y="38" class="boxTitle">Simple project story</text>
      <text x="20" y="67" class="body">Collect trusted public evidence, map each variant to biological context, assign a transparent severity score, and use that score to prioritize wet-lab only where uncertainty remains high.</text>
      <text x="20" y="92" class="small">Practical goal: faster triage and fewer unnecessary functional experiments, without claiming mechanism proof from computational data alone.</text>
    </g>
  </g>

  <g transform="translate(1460,70)">
    <rect x="0" y="0" width="250" height="110" rx="10" fill="#ffffff" stroke="#d3dee6"/>
    <text x="14" y="28" class="badge">Project files</text>
    <text x="14" y="52" class="small">config.py</text>
    <text x="14" y="70" class="small">importer.py</text>
    <text x="14" y="88" class="small">parser.py</text>
    <text x="110" y="88" class="small">processor.py</text>
  </g>
</svg>
